<!-- HEADER -->
<header class="fixed top-0 left-0 right-0 z-50 bg-[#1a1d27] border-b border-[#2e3350]">
  <div class="max-w-screen-xl mx-auto px-6 flex items-center justify-between h-16">

    <!-- Logo -->
    <div class="flex items-center gap-3">
      <span class="text-2xl">🏛</span>
      <div>
        <h1 class="text-white font-bold text-lg leading-none">Government Score</h1>
        <p class="text-[#7b82a0] text-xs">Economic & Governance Index</p>
      </div>
    </div>

    <!-- Tabs -->
    <nav class="flex gap-1 bg-[#0f1117] rounded-xl p-1">
      <button
        (click)="setTab('calculator')"
        [class]="activeTab === 'calculator'
          ? 'px-5 py-2 rounded-lg bg-[#6366f1] text-white font-semibold text-sm transition-all'
          : 'px-5 py-2 rounded-lg text-[#7b82a0] hover:text-white font-semibold text-sm transition-all'">
        Score Calculator
      </button>
      <button
        (click)="setTab('countries')"
        [class]="activeTab === 'countries'
          ? 'px-5 py-2 rounded-lg bg-[#6366f1] text-white font-semibold text-sm transition-all'
          : 'px-5 py-2 rounded-lg text-[#7b82a0] hover:text-white font-semibold text-sm transition-all'">
        Countries Dashboard
      </button>
    </nav>

    <!-- Badge -->
    <div class="flex items-center gap-2">
      <span class="w-2 h-2 rounded-full bg-[#22c55e] animate-pulse"></span>
      <span class="text-[#7b82a0] text-xs">Live</span>
    </div>

  </div>
</header>

<!-- MAIN CONTENT -->
<main class="min-h-screen bg-[#0f1117] pt-20 pb-8 px-6">
  <div class="max-w-screen-xl mx-auto">

    @if (activeTab === 'calculator') {
      <app-score-form />
    }

    @if (activeTab === 'countries') {
      <app-countries-dashboard />
    }

  </div>
</main>
