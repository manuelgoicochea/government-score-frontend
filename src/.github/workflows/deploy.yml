name: Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate environment files
        env:
          API_URL: ${{ secrets.API_URL }}
        run: |
          mkdir -p src/environments
          echo "export const environment = { production: false, apiUrl: 'http://localhost:8000' };" > src/environments/environment.ts
          echo "export const environment = { production: true, apiUrl: '${API_URL}' };" > src/environments/environment.prod.ts
          echo "Generated environment.prod.ts with apiUrl: ${API_URL}"

      - name: Build Angular (production)
        run: npm run build -- --configuration production

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/government-score-frontend/browser
          force_orphan: true